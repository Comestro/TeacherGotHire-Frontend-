name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: frontend-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /home/ptpinstitute/htdocs/www.ptpinstitute.com/TeacherGotHire-Frontend-
  PORT: ${{ secrets.SSH_PORT || '22' }}

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Validate SSH configuration
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error::Missing required secret HOST. Set it to the VPS public IP or public DNS record."
            exit 1
          fi

          if [ -z "${SSH_KEY}" ]; then
            echo "::error::Missing required secret SSH_PRIVATE_KEY."
            exit 1
          fi

          echo "SSH target configured for ${DEPLOY_HOST}:${{ env.PORT }}"

      - name: Preflight SSH reachability
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.HOST }}
          DEPLOY_PORT: ${{ env.PORT }}
        run: |
          set -euo pipefail

          echo "Resolving ${DEPLOY_HOST}..."
          resolved_ips="$(getent ahosts "${DEPLOY_HOST}" | awk '{print $1}' | sort -u)"

          if [ -z "${resolved_ips}" ]; then
            echo "::error::Unable to resolve HOST='${DEPLOY_HOST}'. Use the VPS public IP or a public DNS record."
            exit 1
          fi

          echo "Resolved ${DEPLOY_HOST} to:"
          printf '%s\n' "${resolved_ips}"

          echo "Probing TCP connectivity to ${DEPLOY_HOST}:${DEPLOY_PORT}..."
          if ! timeout 10 bash -c ">/dev/tcp/${DEPLOY_HOST}/${DEPLOY_PORT}" 2>/dev/null; then
            echo "::error::GitHub runner cannot reach ${DEPLOY_HOST}:${DEPLOY_PORT}. Ensure SSH is publicly reachable on that port."
            exit 1
          fi

          echo "TCP port ${DEPLOY_PORT} is reachable from the GitHub runner."

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: root
          port: ${{ env.PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            git pull --ff-only origin main

            if command -v npm >/dev/null 2>&1; then
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              npm run build
            elif command -v yarn >/dev/null 2>&1; then
              yarn install --frozen-lockfile
              yarn build
            else
              echo "Neither npm nor yarn is installed on the server."
              exit 1
            fi

            if [ ! -f dist/index.html ]; then
              echo "Frontend build completed, but dist/index.html was not found."
              exit 1
            fi

            if command -v systemctl >/dev/null 2>&1; then
              systemctl reload nginx
            elif command -v service >/dev/null 2>&1; then
              service nginx reload
            else
              echo "Nginx reload command is not available on the server."
              exit 1
            fi

            echo "Frontend built in place at ${PWD}/dist and nginx reloaded."
