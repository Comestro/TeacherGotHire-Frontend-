name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: frontend-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /home/ptpinstitute/htdocs/www.ptpinstitute.com/TeacherGotHire-Frontend-
  DOCKER_IMAGE: teacher-got-hire-frontend

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy Docker Container
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"
            git pull --ff-only origin main

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build --remove-orphans
            else
              docker-compose up -d --build --remove-orphans
            fi

            echo "Frontend container is listening on http://127.0.0.1:8080"
            docker image prune -f
